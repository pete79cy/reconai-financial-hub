services:
  frontend:
    build: .
    container_name: reconai-financial-hub
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - reconai

  backend:
    build: ./server
    container_name: reconai-backend
    environment:
      - DATABASE_URL=postgresql://PXaqrNYObt81Q6MZ:IQjd9t7NII2SJttPpMNz2wwMb1qPDzxh@postgresql-kjk8-postgresql-1:5432/3DwE8luKqmKZYGJw
      - PORT=4000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    networks:
      - reconai
      - pg-net

networks:
  reconai:
    driver: bridge
  pg-net:
    external: true
    name: postgresql-kjk8_default
